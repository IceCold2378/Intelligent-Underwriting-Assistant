name: Enterprise CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    name: Backend PyTest 🐍
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: underwriting
          POSTGRES_PASSWORD: underwriting_secret
          POSTGRES_DB: underwriting_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install Dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Backend Tests
      working-directory: ./backend
      env:
        ENVIRONMENT: testing
        DATABASE_URL: sqlite+aiosqlite:///:memory:
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest tests/ -v

  frontend-build:
    name: Frontend React Build ⚛️
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install NPM Dependencies & Build
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

  docker-lint:
    name: Container Linting 🐋
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Docker Compose
        run: docker compose -f docker-compose.prod.yml config -q
